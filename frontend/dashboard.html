<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Dashboard</h1>

<div id="result"></div>

<script>

const token = localStorage.getItem("token");

fetch("/api/dashboard", {

    headers: {
        Authorization: `Bearer ${token}`
    }

})
.then(res => res.json())
.then(data => {

    document.getElementById("result").innerHTML =
        JSON.stringify(data);

});

</script>

</body>
</html>
